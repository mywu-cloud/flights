<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#x7968;&#x50F9;&#x96F7;&#x9054; FareRadar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:#f0f4f8;color:#1a202c}
a{text-decoration:none;color:inherit}
.nav{background:#fff;border-bottom:1px solid #e2e8f0;height:60px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1rem;letter-spacing:-0.01em;white-space:nowrap}
.nav-icon{width:34px;height:34px;background:#4A6CF7;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem}
.nav-brand-sub{font-size:0.85rem;color:#64748b;font-weight:500;letter-spacing:0.02em}
.nav-search{flex:1;max-width:320px;position:relative}
.nav-search input{width:100%;padding:7px 12px 7px 34px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.85rem;background:#f8fafc;outline:none}
.nav-search input:focus{border-color:#4A6CF7;background:#fff;box-shadow:0 0 0 3px rgba(74,108,247,0.1)}
.nav-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.9rem}
.theme-btn{padding:5px 12px;border-radius:20px;border:1px solid #e2e8f0;background:#f8fafc;font-size:0.8rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
[data-theme=sky] .theme-sky,.theme-sky.active{color:#4A6CF7;border-color:#4A6CF7;background:#EEF2FF}
[data-theme=mint] .theme-mint,.theme-mint.active{color:#10B981;border-color:#10B981;background:#ECFDF5}
[data-theme=warm] .theme-warm,.theme-warm.active{color:#F59E0B;border-color:#F59E0B;background:#FFFBEB}
.nav-bell{width:36px;height:36px;border-radius:50%;background:#f8fafc;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:1.1rem}
.bell-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:#EF4444;border-radius:50%;font-size:.6rem;color:#fff;display:flex;align-items:center;justify-content:center}
.nav-avatar{width:34px;height:34px;background:#4A6CF7;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;cursor:pointer}
.nav-spacer{flex:1}
:root,[data-theme=sky]{--primary:#4A6CF7;--primary-light:#EEF2FF;--bg:#f0f4f8;--bg-secondary:#f8fafc}
[data-theme=mint]{--primary:#10B981;--primary-light:#ECFDF5}
[data-theme=warm]{--primary:#F59E0B;--primary-light:#FFFBEB}
:root{--text-secondary:#64748b;--border:#e2e8f0;--card:#fff}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
.page-header{margin-bottom:24px}
.page-label{font-size:.75rem;font-weight:600;color:var(--primary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.page-title{font-size:1.8rem;font-weight:800;color:#1a202c;margin-bottom:6px}
.page-subtitle{color:var(--text-secondary);font-size:.9rem;margin-bottom:16px}
.btn-primary{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:#fff;color:#1a202c;border:1px solid var(--border);padding:8px 16px;border-radius:8px;font-size:.85rem;cursor:pointer}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;font-size:1rem;opacity:.6;transition:opacity .2s}
.btn-icon:hover{opacity:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:16px}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.stat-icon.blue{background:var(--primary-light)}.stat-icon.yellow{background:#FFFBEB}.stat-icon.green{background:#ECFDF5}.stat-icon.purple{background:#F5F3FF}
.stat-label{font-size:.75rem;color:var(--text-secondary);font-weight:500;margin-bottom:4px}
.stat-value{font-size:1.5rem;font-weight:800;color:#1a202c}
.stat-sub{font-size:.75rem;color:var(--text-secondary);margin-top:2px}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:700px){.main-grid{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
.card-link{font-size:.8rem;color:var(--primary)}
.route-avatar{width:40px;height:40px;background:var(--primary-light);color:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.loading-text{text-align:center;color:var(--text-secondary);padding:24px;font-size:.9rem}
.alert-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.alert-item:last-child{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600;white-space:nowrap}
.badge-green{background:#ECFDF5;color:#059669}.badge-red{background:#FEF2F2;color:#DC2626}.badge-yellow{background:#FFFBEB;color:#D97706}.badge-gray{background:#F1F5F9;color:#64748b}.badge-blue{background:#EEF2FF;color:#4A6CF7}
.table-section{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-section-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f1f5f9}
.table-section-title{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:.75rem;color:var(--text-secondary);font-weight:600;background:#f8fafc;border-bottom:1px solid #f1f5f9}
td{padding:12px 16px;border-bottom:1px solid #f9fafb;font-size:.875rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.form-input{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:.9rem;outline:none}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(74,108,247,.1)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
footer{text-align:center;color:var(--text-secondary);font-size:.8rem;padding:20px}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand"><div class="nav-icon">&#x2708;</div><div><div>&#x7968;&#x50F9;&#x96F7;&#x9054; FareRadar</div><div class="nav-brand-sub">&#x6307;&#x6578;&#x7DAD;&#x865F;</div></div></div>
  <div class="nav-search"><span class="nav-search-icon">&#x1F50D;</span><input type="text" placeholder="&#x641C;&#x5C0B;&#x822A;&#x7DDA;..."></div>
  <div class="nav-spacer"></div>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="theme-btn theme-sky active" onclick="setTheme('sky',this)">&#x2600; &#x6674;&#x7A7A;</button>
    <button class="theme-btn theme-mint" onclick="setTheme('mint',this)">&#x1F33F; &#x8584;&#x8377;</button>
    <button class="theme-btn theme-warm" onclick="setTheme('warm',this)">&#x2600; &#x6696;&#x967D;</button>
  </div>
  <div class="nav-bell">&#x1F514;<span class="bell-badge">2</span></div>
  <div class="nav-avatar">&#x9673;</div>
</nav>
<div class="container">
  <div class="page-header">
    <div class="page-label">&#x5100;&#x8868;&#x677F; &middot; DASHBOARD</div>
    <h1 class="page-title">&#x6211;&#x7684;&#x7968;&#x50F9;&#x8FFD;&#x8E64;</h1>
    <p class="page-subtitle" id="pageSubtitle">Loading...</p>
    <button class="btn-primary" onclick="openModal()">&#xFF0B; &#x65B0;&#x589E;&#x8FFD;&#x8E64;</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon blue">&#x2708;</div><div><div class="stat-label">&#x8FFD;&#x8E64;&#x822A;&#x7DDA;</div><div class="stat-value" id="statTotal">--</div><div class="stat-sub">&#x689D;&#x822A;&#x7DDA;&#x76E3;&#x63A7;&#x4E2D;</div></div></div>
    <div class="stat-card"><div class="stat-icon yellow">&#x1F514;</div><div><div class="stat-label">&#x89F8;&#x767C;&#x63D0;&#x9192;</div><div class="stat-value" id="statTriggered">--</div><div class="stat-sub">&#x689D;&#x5DF2;&#x9054;&#x5230;&#x76EE;&#x6A19;&#x50F9;</div></div></div>
    <div class="stat-card"><div class="stat-icon green">&#x1F4B0;</div><div><div class="stat-label">&#x6700;&#x65B0;&#x6700;&#x4F4E;&#x50F9;</div><div class="stat-value" id="statSaving">--</div><div class="stat-sub">--</div></div></div>
    <div class="stat-card"><div class="stat-icon purple">&#x23F0;</div><div><div class="stat-label">&#x6700;&#x5F8C;&#x66F4;&#x65B0;</div><div class="stat-value" id="statDrop">--</div><div class="stat-sub" id="statDropSub">&#x81EA;&#x52D5;&#x6BCF;&#x65E5; 2 &#x6B21;</div></div></div>
  </div>
  <div class="main-grid">
    <div class="card"><div id="featuredCard"><p style="text-align:center;color:var(--text-secondary);padding:24px">Loading...</p></div></div>
    <div class="card"><div class="card-header"><div class="card-title">&#x1F4E2; &#x50F9;&#x683C;&#x8B66;&#x5831;</div><a href="#" class="card-link">&#x67E5;&#x770B;&#x5168;&#x90E8;</a></div><div id="alertsList"><p style="text-align:center;color:var(--text-secondary);padding:16px">Loading...</p></div></div>
  </div>
  <div class="table-section">
    <div class="table-section-header"><div class="table-section-title">&#x8FFD;&#x8E64;&#x4E2D;&#x7684;&#x822A;&#x7DDA; <span class="badge badge-blue" id="tableCount">0</span></div><div style="font-size:.8rem;color:var(--text-secondary)">&#x9EDE;&#x9078;&#x822A;&#x7DDA;&#x4EE5;&#x67E5;&#x770B;&#x8D70;&#x52E2;</div></div>
    <table><thead><tr><th>&#x822A;&#x7DDA;</th><th>&#x76EE;&#x524D;&#x7968;&#x50F9;</th><th>&#x6F32;&#x8DCC;</th><th>&#x8FD1; 7 &#x5929;</th><th>&#x76EE;&#x6A19;&#x50F9;</th><th>&#x72C0;&#x614B;</th></tr></thead>
    <tbody id="routeTableBody"><tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-secondary)">Loading...</td></tr></tbody></table>
  </div>
</div>
<div class="modal-overlay" id="addModal"><div class="modal-box">
  <div class="modal-title">&#xFF0B; &#x65B0;&#x589E;&#x8FFD;&#x8E64;&#x822A;&#x7DDA;</div>
  <div class="form-group"><label class="form-label">&#x51FA;&#x767C;&#x5730; (IATA)</label><input type="text" id="inputOrigin" class="form-input" placeholder="TPE" maxlength="3"></div>
  <div class="form-group"><label class="form-label">&#x76EE;&#x7684;&#x5730; (IATA)</label><input type="text" id="inputDest" class="form-input" placeholder="NRT" maxlength="3"></div>
  <div class="form-group"><label class="form-label">&#x51FA;&#x767C;&#x65E5;&#x671F;</label><input type="date" id="inputDate" class="form-input"></div>
  <div class="form-group"><label class="form-label">&#x76EE;&#x6A19;&#x50F9;&#x683C; (TWD)</label><input type="number" id="inputTarget" class="form-input" placeholder="8000"></div>
  <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="addSub()">&#x78BA;&#x8A8D;&#x65B0;&#x589E;</button></div>
</div></div>
<footer>&#x7968;&#x50F9;&#x96F7;&#x9054; FareRadar &mdash; &#x8CC7;&#x6599;&#x4F86;&#x6E90;&#xFF1A;Google Flights &mdash; <a href="https://github.com/mywu-cloud/flights">GitHub</a></footer>
<script>
const WORKER_URL='https://flights.tw-mywu.workers.dev';
let subsData=[],pricesData={prices:{},history:{}},currentTheme='sky';

async function loadSubs(){
  try{
    const r=await fetch(WORKER_URL+'/subscriptions');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const json=await r.json();
    subsData=Array.isArray(json)?json:(json.subscriptions||[]);
    const sub=document.getElementById('pageSubtitle');
    if(sub)sub.textContent='Tracking '+subsData.length+' routes';
    const tc=document.getElementById('tableCount');
    if(tc)tc.textContent=subsData.length;
    await loadPrices();
    updateStats();renderFeatured();renderAlerts();renderTable();
  }catch(e){
    document.querySelectorAll('.loading-text').forEach(function(el){el.textContent='Error: '+e.message;});
    const rb=document.getElementById('routeTableBody');
    if(rb)rb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:24px;color:red">Error: '+e.message+'</td></tr>';
  }
}

async function loadPrices(){
  try{
    const[pr,hr]=await Promise.all([
      fetch('https://mywu-cloud.github.io/flights/data/prices.json'),
      fetch('https://mywu-cloud.github.io/flights/data/history.json')
    ]);
    if(pr.ok){const pd=await pr.json();pricesData.prices=pd.prices||pd;}
    if(hr.ok){const hd=await hr.json();pricesData.history=hd.history||hd;}
  }catch(e){console.log('Prices error:',e.message);}
}

function updateStats(){
  const prices=pricesData.prices||{};
  let triggered=0,bestSaving=0,bestDrop=0,bestDropRoute='';
  subsData.forEach(function(s){
    const p=prices[s.id];if(!p)return;
    if(s.target_price&&p.price<=s.target_price)triggered++;
    if(s.target_price&&p.price<s.target_price){const sv=s.target_price-p.price;if(sv>bestSaving)bestSaving=sv;}
    const hist=(pricesData.history||{})[s.id];
    if(hist&&hist.length>1){const drop=Math.round((hist[0].price-hist[hist.length-1].price)/hist[0].price*100);if(drop>bestDrop){bestDrop=drop;bestDropRoute=(s.origin||'')+' -> '+(s.destination||'');}}
  });
  const e1=document.getElementById('statTotal'),e2=document.getElementById('statTriggered');
  const e3=document.getElementById('statSaving'),e4=document.getElementById('statDrop'),e5=document.getElementById('statDropSub');
  if(e1)e1.textContent=subsData.length;
  if(e2)e2.textContent=triggered;
  if(e3)e3.textContent=bestSaving>0?'NT$'+bestSaving.toLocaleString():'--';
  if(e4)e4.textContent=bestDrop>0?'-'+bestDrop+'%':'--';
  if(e5)e5.textContent=bestDropRoute||'Best route';
}

function updateSliderVal(val){const el=document.getElementById('fcVal');if(el)el.textContent='NT$'+Number(val).toLocaleString();}

function renderFeatured(){
  const el=document.getElementById('featuredCard');if(!el)return;
  if(!subsData.length){el.innerHTML='<p style="text-align:center;color:var(--text-secondary);padding:24px">No routes tracked</p>';return;}
  const prices=pricesData.prices||{},history=pricesData.history||{};
  let best=subsData[0];
  subsData.forEach(function(s){if(prices[s.id]&&!prices[best.id])best=s;});
  const p=prices[best.id],hist=history[best.id]||[],price=p?p.price:null,target=best.target_price||0;
  const priceStr=price?'NT$'+price.toLocaleString():'--',targetStr=target?'NT$'+target.toLocaleString():'--';
  let svgPath='';
  if(hist.length>1){
    const vals=hist.map(function(h){return h.price;}),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),range=mx-mn||1;
    svgPath='<polyline points="'+vals.map(function(v,i){return((i/(vals.length-1))*280).toFixed(1)+','+(75-((v-mn)/range)*65).toFixed(1);}).join(' ')+'" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linejoin="round"/>';
  }
  let trend='';
  if(hist.length>=2){
    const pct=Math.round((hist[hist.length-1].price-hist[0].price)/hist[0].price*100);
    trend='<span class="badge '+(pct<0?'badge-green':'badge-red')+'">'+(pct<0?'&#x25BC;':'&#x25B2;')+' '+Math.abs(pct)+'%</span>';
  }
  const origin=best.origin||'',dest=best.destination||'',initials=(origin.substring(0,2)+dest.substring(0,1)).toUpperCase();
  const smin=Math.round((price||5000)*0.7),smax=Math.round((price||5000)*1.3),sval=target||price||5000;
  el.innerHTML=
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
    '<div class="route-avatar">'+initials+'</div>'+
    '<div><div style="font-weight:700;font-size:1.1rem">'+origin+' &#x2192; '+dest+'</div>'+
    '<div style="color:var(--text-secondary);font-size:.85rem">'+(best.date||'')+'</div></div>'+
    (trend?'<div style="margin-left:auto">'+trend+'</div>':'')+'</div>'+
    '<div style="font-size:2rem;font-weight:800;color:var(--primary);margin-bottom:4px">'+priceStr+'</div>'+
    '<div style="color:var(--text-secondary);font-size:.85rem;margin-bottom:16px">&#x76EE;&#x6A19;&#x50F9;: '+targetStr+'</div>'+
    '<div style="background:var(--bg-secondary);border-radius:8px;padding:12px;margin-bottom:16px">'+
    '<svg viewBox="0 0 280 80" style="width:100%;height:80px">'+
    (svgPath||'<text x="140" y="45" text-anchor="middle" fill="var(--text-secondary)" font-size="13">&#x66AB;&#x7121;&#x6B77;&#x53F2;</text>')+
    '</svg></div>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+
    '<label style="font-size:.85rem;color:var(--text-secondary)">&#x76EE;&#x6A19;&#x50F9;&#x683C;:</label>'+
    '<input type="range" id="fcSlider" min="'+smin+'" max="'+smax+'" value="'+sval+'" style="flex:1" oninput="updateSliderVal(this.value)">'+
    '<span id="fcVal" style="font-weight:600">'+targetStr+'</span></div>'+
    '<button id="fcSim" class="btn-primary" style="width:100%">&#x6A21;&#x64EC;&#x5230;&#x50F9;&#x63D0;&#x9192;</button>';
  const sim=document.getElementById('fcSim');
  if(sim)sim.addEventListener('click',function(){showToast('&#x2705; &#x5DF2;&#x9054;&#x6A19;!');});
}

function renderAlerts(){
  const el=document.getElementById('alertsList');if(!el)return;
  const prices=pricesData.prices||{};
  const items=subsData.filter(function(s){const p=prices[s.id];return p&&s.target_price&&p.price<=s.target_price*1.1;}).slice(0,5);
  if(!items.length){el.innerHTML='<p style="text-align:center;color:var(--text-secondary);padding:16px">&#x66AB;&#x7121;&#x50F9;&#x683C;&#x8B66;&#x5831;</p>';return;}
  el.innerHTML=items.map(function(s){
    const p=prices[s.id],isHit=p.price<=s.target_price;
    return '<div class="alert-item"><div style="flex:1"><div style="font-weight:600">'+s.origin+' &#x2192; '+s.destination+'</div>'+
    '<div style="font-size:.8rem;color:var(--text-secondary)">NT$'+p.price.toLocaleString()+'</div></div>'+
    '<span class="badge '+(isHit?'badge-green':'badge-yellow')+'">'+(isHit?'&#x5DF2;&#x9054;&#x6A19;':'&#x964D;&#x50F9;')+'</span></div>';
  }).join('');
}

function renderTable(){
  const tbody=document.getElementById('routeTableBody');if(!tbody)return;
  if(!subsData.length){
    tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-secondary)">&#x66AB;&#x7121;&#x8FFD;&#x8E64;&#x8DEF;&#x7DDA;</td></tr>';
    return;
  }
  const prices=pricesData.prices||{},history=pricesData.history||{};
  tbody.innerHTML=subsData.map(function(s){
    const p=prices[s.id],hist=history[s.id]||[],price=p?p.price:null;
    const priceStr=price?'NT$'+price.toLocaleString():'--',target=s.target_price||0,targetStr=target?'NT$'+target.toLocaleString():'--';
    let badge='';
    if(hist.length>=2){const pct=Math.round((hist[hist.length-1].price-hist[0].price)/hist[0].price*100);badge='<span class="badge '+(pct<0?'badge-green':'badge-red')+'">'+(pct<0?'&#x25BC;':'&#x25B2;')+' '+Math.abs(pct)+'%</span>';}
    let spark='';
    if(hist.length>1){
      const vals=hist.map(function(h){return h.price;}),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),range=mx-mn||1;
      spark='<svg viewBox="0 0 60 20" style="width:60px;height:20px"><polyline points="'+vals.map(function(v,i){return((i/(vals.length-1))*60).toFixed(1)+','+(18-((v-mn)/range)*14).toFixed(1);}).join(' ')+'" fill="none" stroke="var(--primary)" stroke-width="1.5"/></svg>';
    }else spark='<span style="color:var(--text-secondary)">--</span>';
    const isHit=price&&target&&price<=target;
    const status=isHit?'<span class="badge badge-green">&#x5DF2;&#x9054;&#x6A19;</span>':'<span class="badge badge-gray">&#x8FFD;&#x8E64;&#x4E2D;</span>';
    const initials=((s.origin||'').substring(0,2)+(s.destination||'').substring(0,1)).toUpperCase();
    const sid=(s.id||'').replace(/'/g,'\\\'');
    return '<tr><td><div style="display:flex;align-items:center;gap:8px">'+
    '<div class="route-avatar" style="width:32px;height:32px;font-size:.7rem">'+initials+'</div>'+
    '<div><div style="font-weight:600">'+(s.origin||'')+' &#x2192; '+(s.destination||'')+'</div>'+
    '<div style="font-size:.75rem;color:var(--text-secondary)">'+(s.date||'')+'</div></div></div></td>'+
    '<td style="color:var(--text-secondary)">'+(s.airline||'--')+'</td>'+
    '<td style="font-weight:700;color:var(--primary)">'+priceStr+'</td>'+
    '<td>'+(badge||'--')+'</td>'+
    '<td>'+spark+'</td><td>'+targetStr+'</td>'+
    '<td>'+status+' <button class="btn-icon" onclick="deleteSub(\'"+sid+"\')" title="Del">&#x1F5D1;</button></td></tr>';
  }).join('');
}

function setTheme(t,btn){currentTheme=t;document.documentElement.setAttribute('data-theme',t);document.querySelectorAll('.theme-btn').forEach(function(b){b.classList.remove('active');});if(btn)btn.classList.add('active');}
function openModal(){const m=document.getElementById('addModal');if(m)m.style.display='flex';}
function closeModal(){const m=document.getElementById('addModal');if(m)m.style.display='none';}
function showToast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:8px;z-index:9999;font-size:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:opacity .5s';document.body.appendChild(t);}t.innerHTML=msg;t.style.opacity='1';setTimeout(function(){t.style.opacity='0';},3000);}

async function addSub(){
  const origin=(document.getElementById('inputOrigin')||{}).value||'',destination=(document.getElementById('inputDest')||{}).value||'',date=(document.getElementById('inputDate')||{}).value||'',target=(document.getElementById('inputTarget')||{}).value||'';
  if(!origin||!destination||!date){showToast('Please fill required fields');return;}
  const id=origin.toLowerCase()+'-'+destination.toLowerCase()+'-'+date.replace(/-/g,'');
  const newSub={id:id,origin:origin.toUpperCase(),destination:destination.toUpperCase(),date:date,target_price:target?parseInt(target):null,active:true};
  if(subsData.some(function(s){return s.id===newSub.id;})){showToast('Route already exists');return;}
  subsData.push(newSub);await saveSubs();closeModal();
  updateStats();renderFeatured();renderAlerts();renderTable();
  showToast('&#x2705; Added: '+newSub.origin+' &#x2192; '+newSub.destination);
}

async function deleteSub(id){
  subsData=subsData.filter(function(s){return s.id!==id;});
  await saveSubs();updateStats();renderFeatured();renderAlerts();renderTable();
  showToast('&#x2705; Deleted');
}

async function saveSubs(){
  try{
    const r=await fetch(WORKER_URL+'/subscriptions',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(subsData)});
    if(!r.ok)throw new Error('HTTP '+r.status);
  }catch(e){showToast('Save failed: '+e.message);}
}

window.addEventListener('click',function(e){const m=document.getElementById('addModal');if(m&&e.target===m)closeModal();});
loadSubs();
</script>
