<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#x6A5F;&#x7968;&#x96F7;&#x9054; FareRadar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Helvetica,-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;font-size:13px;background:#f0f4f8;color:#1a202c}
a{text-decoration:none;color:inherit}
.nav{background:#fff;border-bottom:1px solid #e2e8f0;height:60px;display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1rem;letter-spacing:-0.01em;white-space:nowrap}
.nav-icon{width:34px;height:34px;background:#4A6CF7;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem}
.nav-brand-sub{font-size:13px;color:#64748b;font-weight:500;letter-spacing:0.02em}
.nav-search{flex:1;max-width:320px;position:relative}
.nav-search input{width:100%;padding:7px 12px 7px 34px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;background:#f8fafc;outline:none}
.nav-search input:focus{border-color:#4A6CF7;background:#fff;box-shadow:0 0 0 3px rgba(74,108,247,0.1)}
.nav-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:.9rem}
.theme-btn{padding:5px 12px;border-radius:20px;border:1px solid #e2e8f0;background:#f8fafc;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
[data-theme=sky] .theme-sky,.theme-sky.active{color:#4A6CF7;border-color:#4A6CF7;background:#EEF2FF}
[data-theme=mint] .theme-mint,.theme-mint.active{color:#10B981;border-color:#10B981;background:#ECFDF5}
[data-theme=warm] .theme-warm,.theme-warm.active{color:#F59E0B;border-color:#F59E0B;background:#FFFBEB}
.nav-bell{width:36px;height:36px;border-radius:50%;background:#f8fafc;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:1.1rem}
.bell-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:#EF4444;border-radius:50%;font-size:11px;color:#fff;display:flex;align-items:center;justify-content:center}
.nav-avatar{width:34px;height:34px;background:#4A6CF7;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer}
.nav-spacer{flex:1}
:root,[data-theme=sky]{--primary:#4A6CF7;--primary-light:#EEF2FF;--bg:#f0f4f8;--bg-secondary:#f8fafc}
[data-theme=mint]{--primary:#10B981;--primary-light:#ECFDF5}
[data-theme=warm]{--primary:#F59E0B;--primary-light:#FFFBEB}
:root{--text-secondary:#64748b;--border:#e2e8f0;--card:#fff}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
.page-header{margin-bottom:24px}
.page-label{font-size:13px;font-weight:600;color:var(--primary);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.page-title{font-size:1.8rem;font-weight:800;color:#1a202c;margin-bottom:6px}
.page-subtitle{color:var(--text-secondary);font-size:13px;margin-bottom:16px}
.btn-primary{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:#fff;color:#1a202c;border:1px solid var(--border);padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;font-size:1rem;opacity:.6;transition:opacity .2s}
.btn-icon:hover{opacity:1}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px 20px;display:flex;align-items:center;gap:16px}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.stat-icon.blue{background:var(--primary-light)}.stat-icon.yellow{background:#FFFBEB}.stat-icon.green{background:#ECFDF5}.stat-icon.purple{background:#F5F3FF}
.stat-label{font-size:13px;color:var(--text-secondary);font-weight:500;margin-bottom:4px}
.stat-value{font-size:1.5rem;font-weight:800;color:#1a202c}
.stat-sub{font-size:13px;color:var(--text-secondary);margin-top:2px}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:700px){.main-grid{grid-template-columns:1fr}}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
.card-link{font-size:13px;color:var(--primary)}
.route-avatar{width:40px;height:40px;background:var(--primary-light);color:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.loading-text{text-align:center;color:var(--text-secondary);padding:24px;font-size:13px}
.alert-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.alert-item:last-child{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:13px;font-weight:600;white-space:nowrap}
.badge-green{background:#ECFDF5;color:#059669}.badge-red{background:#FEF2F2;color:#DC2626}.badge-yellow{background:#FFFBEB;color:#D97706}.badge-gray{background:#F1F5F9;color:#64748b}.badge-blue{background:#EEF2FF;color:#4A6CF7}
.table-section{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-section-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f1f5f9}
.table-section-title{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:13px;color:var(--text-secondary);font-weight:600;background:#f8fafc;border-bottom:1px solid #f1f5f9}
td{padding:12px 16px;border-bottom:1px solid #f9fafb;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.form-input{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(74,108,247,.1)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
footer{text-align:center;color:var(--text-secondary);font-size:13px;padding:20px}
</style>
</head>
<body>
<nav class="nav">
<div class="nav-brand"><div class="nav-icon">&#x2708;</div><div><div>&#x6A5F;&#x7968;&#x96F7;&#x9054; FareRadar</div><div class="nav-brand-sub">&#x7968;&#x50F9;&#x8FFD;&#x8E64;</div></div></div>
<div class="nav-search"><span class="nav-search-icon">&#x1F50D;</span><input type="text" placeholder="&#x641C;&#x5C0B;&#x822A;&#x7DDA;..."></div>
<div class="nav-spacer"></div>
<div style="display:flex;gap:6px;align-items:center">
<button class="theme-btn theme-sky active" onclick="setTheme('sky',this)">&#x2600; &#x6674;&#x7A7A;</button>
<button class="theme-btn theme-mint" onclick="setTheme('mint',this)">&#x1F33F; &#x8584;&#x8377;</button>
<button class="theme-btn theme-warm" onclick="setTheme('warm',this)">&#x2600; &#x6696;&#x967D;</button>
</div>
<div class="nav-bell">&#x1F514;<span class="bell-badge">2</span></div>
<div class="nav-avatar">&#x9673;</div>
</nav>
<div class="container">
<div class="page-header">
<div class="page-label">&#x5100;&#x8868;&#x677F; &middot; DASHBOARD</div>
<h1 class="page-title">&#x6211;&#x7684;&#x7968;&#x50F9;&#x8FFD;&#x8E64;</h1>
<p class="page-subtitle" id="pageSubtitle">Loading...</p>
<button class="btn-primary" onclick="openModal()">&#xFF0B; &#x65B0;&#x589E;&#x8FFD;&#x8E64;</button>
</div>
<div class="stats-grid">
<div class="stat-card"><div class="stat-icon blue">&#x2708;</div><div><div class="stat-label">&#x8FFD;&#x8E64;&#x822A;&#x7DDA;</div><div class="stat-value" id="statTotal">--</div><div class="stat-sub">&#x689D;&#x822A;&#x7DDA;&#x76E3;&#x63A7;&#x4E2D;</div></div></div>
<div class="stat-card"><div class="stat-icon yellow">&#x1F514;</div><div><div class="stat-label">&#x89F8;&#x767C;&#x63D0;&#x9192;</div><div class="stat-value" id="statTriggered">--</div><div class="stat-sub">&#x689D;&#x5DF2;&#x9054;&#x5230;&#x76EE;&#x6A19;&#x50F9;</div></div></div>
<div class="stat-card"><div class="stat-icon green">&#x1F4B0;</div><div><div class="stat-label">&#x6700;&#x65B0;&#x6700;&#x4F4E;&#x50F9;</div><div class="stat-value" id="statSaving">--</div><div class="stat-sub" id="statSavingSub">--</div></div></div>
<div class="stat-card"><div class="stat-icon purple">&#x23F0;</div><div><div class="stat-label">&#x6700;&#x5F8C;&#x66F4;&#x65B0;</div><div class="stat-value" id="statDrop">--</div><div class="stat-sub" id="statDropSub">&#x81EA;&#x52D5;&#x6BCF;&#x65E5; 2 &#x6B21;</div></div></div>
</div>
<div class="main-grid">
<div class="card"><div id="featuredCard"><p style="text-align:center;color:var(--text-secondary);padding:24px">Loading...</p></div></div>
<div class="card"><div class="card-header"><div class="card-title">&#x1F4E2; &#x50F9;&#x683C;&#x8B66;&#x5831;</div><a href="#" class="card-link">&#x67E5;&#x770B;&#x5168;&#x90E8;</a></div><div id="alertsList"><p style="text-align:center;color:var(--text-secondary);padding:16px">Loading...</p></div></div>
</div>
<div class="table-section">
<div class="table-section-header"><div class="table-section-title">&#x8FFD;&#x8E64;&#x4E2D;&#x7684;&#x822A;&#x7DDA; <span class="badge badge-blue" id="tableCount">0</span></div><div style="font-size:13px;color:var(--text-secondary)">&#x9EDE;&#x9078;&#x822A;&#x7DDA;&#x4EE5;&#x67E5;&#x770B;&#x8D70;&#x52E2;</div></div>
<table><thead><tr><th>&#x822A;&#x7DDA;</th><th>&#x76EE;&#x524D;&#x7968;&#x50F9;</th><th>&#x6F32;&#x8DCC;</th><th>&#x8FD1; 7 &#x5929;</th><th>&#x76EE;&#x6A19;&#x50F9;</th><th>&#x72C0;&#x614B;</th></tr></thead>
<tbody id="routeTableBody"><tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-secondary)">Loading...</td></tr></tbody></table>
</div>
</div>
<div class="modal-overlay" id="addModal"><div class="modal-box">
<div class="modal-title">&#xFF0B; &#x65B0;&#x589E;&#x8FFD;&#x8E64;&#x822A;&#x7DDA;</div>
<div class="form-group"><label class="form-label">&#x51FA;&#x767C;&#x5730; (IATA)</label><input type="text" id="inputOrigin" class="form-input" placeholder="TPE" maxlength="3"></div>
<div class="form-group"><label class="form-label">&#x76EE;&#x7684;&#x5730; (IATA)</label><input type="text" id="inputDest" class="form-input" placeholder="NRT" maxlength="3"></div>
<div class="form-group"><label class="form-label">&#x51FA;&#x767C;&#x65E5;&#x671F;</label><input type="date" id="inputDate" class="form-input"></div>
<div class="form-group"><label class="form-label">&#x76EE;&#x6A19;&#x50F9;&#x683C; (TWD)</label><input type="number" id="inputTarget" class="form-input" placeholder="8000"></div>
<div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="addSub()">&#x78BA;&#x8A8D;&#x65B0;&#x589E;</button></div>
</div></div>
<footer>&#x6A5F;&#x7968;&#x96F7;&#x9054; FareRadar &mdash; &#x8CC7;&#x6599;&#x4F86;&#x6E90;&#xFF1A;Google Flights &mdash; <a href="https://github.com/mywu-cloud/flights">GitHub</a></footer>
<script>
var WORKER_URL='https://flights.tw-mywu.workers.dev';
var subsData=[],pricesData={prices:{},history:{}},currentTheme='sky';

function loadSubs(){
fetch(WORKER_URL+'/subscriptions').then(function(r){
if(!r.ok)throw new Error('HTTP '+r.status);
return r.json();
}).then(function(json){
subsData=Array.isArray(json)?json:(json.subscriptions||[]);
var sub=document.getElementById('pageSubtitle');
if(sub)sub.innerHTML='&#x8FFD;&#x8E64; '+subsData.length+' &#x689D;&#x822A;&#x7DDA;';
var tc=document.getElementById('tableCount');
if(tc)tc.textContent=subsData.length;
return loadPrices();
}).then(function(){
updateStats();renderFeatured();renderAlerts();renderTable();
}).catch(function(e){
var rb=document.getElementById('routeTableBody');
if(rb)rb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:24px;color:red">Error: '+e.message+'</td></tr>';
});
}

function loadPrices(){
return Promise.all([
fetch('https://mywu-cloud.github.io/flights/data/prices.json'),
fetch('https://mywu-cloud.github.io/flights/data/history.json')
]).then(function(results){
var pr=results[0],hr=results[1];
var p1=pr.ok?pr.json():Promise.resolve({});
var p2=hr.ok?hr.json():Promise.resolve({});
return Promise.all([p1,p2]);
}).then(function(data){
var pd=data[0],hd=data[1];
pricesData.prices=pd.prices||pd;
pricesData.history=hd.history||hd;
}).catch(function(e){console.log('Prices error:',e.message);});
}

function updateStats(){
var prices=pricesData.prices||{};
var triggered=0,bestPrice=null,bestPriceRoute='',bestDrop=0,bestDropRoute='';
subsData.forEach(function(s){
var p=prices[s.id];if(!p)return;
if(s.target_price&&p.price<=s.target_price)triggered++;
if(bestPrice===null||p.price<bestPrice){bestPrice=p.price;bestPriceRoute=(s.origin||'')+' / '+(s.destination||'');}
var hist=(pricesData.history||{})[s.id];
if(hist&&hist.length>1){var drop=Math.round((hist[0].price-hist[hist.length-1].price)/hist[0].price*100);if(drop>bestDrop){bestDrop=drop;bestDropRoute=(s.origin||'')+' / '+(s.destination||'');}}
});
var e1=document.getElementById('statTotal'),e2=document.getElementById('statTriggered');
var e3=document.getElementById('statSaving'),e3s=document.getElementById('statSavingSub');
var e4=document.getElementById('statDrop'),e5=document.getElementById('statDropSub');
if(e1)e1.textContent=subsData.length;
if(e2)e2.textContent=triggered;
if(e3)e3.textContent=bestPrice!==null?'NT$'+bestPrice.toLocaleString():'--';
if(e3s)e3s.innerHTML=bestPriceRoute||'--';
if(e4)e4.textContent=bestDrop>0?'-'+bestDrop+'%':'--';
if(e5)e5.innerHTML=bestDropRoute||'&#x81EA;&#x52D5;&#x6BCF;&#x65E5; 2 &#x6B21;';
}

function updateSliderVal(val){var el=document.getElementById('fcVal');if(el)el.textContent='NT$'+Number(val).toLocaleString();}

function makeTrendSVG(hist,w,h,strokeW){
var half=Math.round(h/2);
if(!hist||hist.length<2){
return '<line x1="0" y1="'+half+'" x2="'+w+'" y2="'+half+'" stroke="#e2e8f0" stroke-width="'+strokeW+'" stroke-dasharray="4 3"/>';
}
var vals=hist.map(function(hh){return hh.price;});
var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),range=mx-mn||1;
var pts=vals.map(function(v,i){
return ((i/(vals.length-1))*w).toFixed(1)+','+(h-4-((v-mn)/range)*(h-8)).toFixed(1);
}).join(' ');
return '<polyline points="'+pts+'" fill="none" stroke="var(--primary)" stroke-width="'+strokeW+'" stroke-linejoin="round"/>';
}

function renderFeatured(){
var el=document.getElementById('featuredCard');if(!el)return;
if(!subsData.length){el.innerHTML='<p style="text-align:center;color:var(--text-secondary);padding:24px">No routes tracked</p>';return;}
var prices=pricesData.prices||{},history=pricesData.history||{};
var best=subsData[0];
subsData.forEach(function(s){if(prices[s.id]&&!prices[best.id])best=s;});
var p=prices[best.id],hist=history[best.id]||[],price=p?p.price:null,target=best.target_price||0;
var priceStr=price?'NT$'+price.toLocaleString():'--',targetStr=target?'NT$'+target.toLocaleString():'--';
var trend='';
if(hist.length>=2){
var pct=Math.round((hist[hist.length-1].price-hist[0].price)/hist[0].price*100);
trend='<span class="badge '+(pct<0?'badge-green':'badge-red')+'">'+(pct<0?'&#x25BC;':'&#x25B2;')+' '+Math.abs(pct)+'%</span>';
}
var origin=best.origin||'',dest=best.destination||'',initials=(origin.substring(0,2)+dest.substring(0,1)).toUpperCase();
var smin=Math.round((price||5000)*0.7),smax=Math.round((price||5000)*1.3),sval=target||price||5000;
var svgContent=makeTrendSVG(hist.length>=2?hist:null,280,80,2);
el.innerHTML=
'<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
'<div class="route-avatar">'+initials+'</div>'+
'<div><div style="font-weight:700;font-size:1.1rem">'+origin+' &#x2192; '+dest+'</div>'+
'<div style="color:var(--text-secondary);font-size:13px">'+(best.date||'')+'</div></div>'+
(trend?'<div style="margin-left:auto">'+trend+'</div>':'')+'</div>'+
'<div style="font-size:2rem;font-weight:800;color:var(--primary);margin-bottom:4px">'+priceStr+'</div>'+
'<div style="color:var(--text-secondary);font-size:13px;margin-bottom:16px">&#x76EE;&#x6A19;&#x50F9;: '+targetStr+'</div>'+
'<div style="background:var(--bg-secondary);border-radius:8px;padding:12px;margin-bottom:16px">'+
'<svg viewBox="0 0 280 80" style="width:100%;height:80px">'+svgContent+'</svg>'+
'</div>'+
'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+
'<label style="font-size:13px;color:var(--text-secondary)">&#x76EE;&#x6A19;&#x50F9;&#x683C;:</label>'+
'<input type="range" id="fcSlider" min="'+smin+'" max="'+smax+'" value="'+sval+'" style="flex:1" oninput="updateSliderVal(this.value)">'+
'<span id="fcVal" style="font-weight:600">'+targetStr+'</span></div>'+
'<button id="fcSim" class="btn-primary" style="width:100%">&#x6A21;&#x64EC;&#x5230;&#x50F9;&#x63D0;&#x9192;</button>';
var sim=document.getElementById('fcSim');
if(sim)sim.onclick=function(){showToast('&#x2705; &#x5DF2;&#x9054;&#x6A19;!');};
}

function renderAlerts(){
var el=document.getElementById('alertsList');if(!el)return;
var prices=pricesData.prices||{};
var items=subsData.filter(function(s){var p=prices[s.id];return p&&s.target_price&&p.price<=s.target_price*1.1;}).slice(0,5);
if(!items.length){el.innerHTML='<p style="text-align:center;color:var(--text-secondary);padding:16px">&#x66AB;&#x7121;&#x50F9;&#x683C;&#x8B66;&#x5831;</p>';return;}
el.innerHTML=items.map(function(s){
var p=prices[s.id],isHit=p.price<=s.target_price;
return '<div class="alert-item"><div style="flex:1"><div style="font-weight:600">'+s.origin+' &#x2192; '+s.destination+'</div>'+
'<div style="font-size:13px;color:var(--text-secondary)">NT$'+p.price.toLocaleString()+'</div></div>'+
'<span class="badge '+(isHit?'badge-green':'badge-yellow')+'">'+(isHit?'&#x5DF2;&#x9054;&#x6A19;':'&#x964D;&#x50F9;')+'</span></div>';
}).join('');
}

function renderTable(){
var tbody=document.getElementById('routeTableBody');if(!tbody)return;
if(!subsData.length){
tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-secondary)">&#x66AB;&#x7121;&#x8FFD;&#x8E64;&#x8DEF;&#x7DDA;</td></tr>';
return;
}
var prices=pricesData.prices||{},history=pricesData.history||{};
tbody.innerHTML=subsData.map(function(s){
var p=prices[s.id],hist=history[s.id]||[],price=p?p.price:null;
var priceStr=price?'NT$'+price.toLocaleString():'--',target=s.target_price||0,targetStr=target?'NT$'+target.toLocaleString():'--';
var badge='<span style="color:var(--text-secondary)">--</span>';
if(price&&hist.length>=2){var pct=Math.round((hist[hist.length-1].price-hist[0].price)/hist[0].price*100);badge='<span class="badge '+(pct<0?'badge-green':'badge-red')+'">'+(pct<0?'&#x25BC;':'&#x25B2;')+' '+Math.abs(pct)+'%</span>';}
var svgContent=makeTrendSVG(hist.length>=2?hist:null,60,20,1.5);
var spark='<svg viewBox="0 0 60 20" style="width:60px;height:20px">'+svgContent+'</svg>';
var isHit=price&&target&&price<=target;
var status=isHit?'<span class="badge badge-green">&#x5DF2;&#x9054;&#x6A19;</span>':'<span class="badge badge-gray">&#x8FFD;&#x8E64;&#x4E2D;</span>';
var initials=((s.origin||'').substring(0,2)+(s.destination||'').substring(0,1)).toUpperCase();
var sid=s.id||'';
return '<tr><td><div style="display:flex;align-items:center;gap:8px">'+
'<div class="route-avatar" style="width:32px;height:32px;font-size:13px">'+initials+'</div>'+
'<div><div style="font-weight:600">'+s.origin+' &#x2192; '+s.destination+'</div>'+
'<div style="font-size:13px;color:var(--text-secondary)">'+s.date+'</div></div></div></td>'+
'<td style="font-weight:700;color:var(--primary)">'+priceStr+'</td>'+
'<td>'+badge+'</td>'+
'<td>'+spark+'</td>'+
'<td>'+targetStr+'</td>'+
'<td>'+status+' <button class="btn-icon" data-del="'+sid+'" title="&#x522A;&#x9664;">&#x1F5D1;</button></td></tr>';
}).join('');
// attach delete handlers via data attribute - no quoting issues
Array.from(tbody.querySelectorAll('[data-del]')).forEach(function(btn){
btn.onclick=function(){deleteSub(btn.getAttribute('data-del'));};
});
}

function setTheme(t,btn){currentTheme=t;document.documentElement.setAttribute('data-theme',t);document.querySelectorAll('.theme-btn').forEach(function(b){b.classList.remove('active');});if(btn)btn.classList.add('active');}
function openModal(){var m=document.getElementById('addModal');if(m)m.style.display='flex';}
function closeModal(){var m=document.getElementById('addModal');if(m)m.style.display='none';}
function showToast(msg){var t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:8px;z-index:9999;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:opacity .5s';document.body.appendChild(t);}t.innerHTML=msg;t.style.opacity='1';setTimeout(function(){t.style.opacity='0';},3000);}

function addSub(){
var origin=(document.getElementById('inputOrigin')||{}).value||'',destination=(document.getElementById('inputDest')||{}).value||'',date=(document.getElementById('inputDate')||{}).value||'',target=(document.getElementById('inputTarget')||{}).value||'';
if(!origin||!destination||!date){showToast('Please fill required fields');return;}
var id=origin.toLowerCase()+'-'+destination.toLowerCase()+'-'+date.replace(/-/g,'');
var newSub={id:id,origin:origin.toUpperCase(),destination:destination.toUpperCase(),date:date,target_price:target?parseInt(target):null,active:true};
if(subsData.some(function(s){return s.id===newSub.id;})){showToast('Route already exists');return;}
subsData.push(newSub);
saveSubs().then(function(){
closeModal();updateStats();renderFeatured();renderAlerts();renderTable();
showToast('&#x2705; Added');
});
}

function deleteSub(id){
subsData=subsData.filter(function(s){return s.id!==id;});
saveSubs().then(function(){
updateStats();renderFeatured();renderAlerts();renderTable();
showToast('&#x2705; Deleted');
});
}

function saveSubs(){
return fetch(WORKER_URL+'/subscriptions',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(subsData)}).then(function(r){
if(!r.ok)throw new Error('HTTP '+r.status);
}).catch(function(e){showToast('Save failed: '+e.message);});
}

window.onclick=function(e){var m=document.getElementById('addModal');if(m&&e.target===m)closeModal();};
loadSubs();
</script>
</body>
</html>
