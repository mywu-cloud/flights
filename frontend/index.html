.nav-bell{position:relative;margin-left:8px;cursor:pointer;padding:7px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:center;color:#64748b}

<script>
const WORKER_URL = 'https://flights.tw-mywu.workers.dev';
let subsData = [];
let pricesData = { prices: {}, history: {} };
let currentTheme = 'sky';

async function loadSubs() {
  try {
    const r = await fetch(WORKER_URL + '/subscriptions');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();
    // Worker returns { subscriptions: [...], sha: "..." }
    subsData = Array.isArray(json) ? json : (json.subscriptions || []);
    await loadPrices();
    updateStats(); renderFeatured(); renderAlerts(); renderTable();
  } catch(e) {
    document.querySelectorAll('.loading-text').forEach(function(el) {
      el.textContent = '載入失敗: ' + e.message;
    });
  }
}

async function loadPrices() {
  try {
    const [pr, hr] = await Promise.all([
      fetch('https://mywu-cloud.github.io/flights/data/prices.json'),
      fetch('https://mywu-cloud.github.io/flights/data/history.json')
    ]);
    if (pr.ok) {
      const pd = await pr.json();
      // prices.json has { updated_at: ..., prices: { "id": { price: N, ... } } }
      pricesData.prices = pd.prices || pd;
    }
    if (hr.ok) {
      const hd = await hr.json();
      // history.json has { updated_at: ..., history: { "id": [...] } }
      pricesData.history = hd.history || hd;
    }
  } catch(e) { console.log('Prices error:', e.message); }
}

function updateStats() {
  const prices = pricesData.prices || {};
  let triggered = 0, bestSaving = 0, bestDrop = 0, bestDropRoute = '';
  subsData.forEach(function(s) {
    const p = prices[s.id]; if (!p) return;
    if (s.target_price && p.price <= s.target_price) triggered++;
    if (s.target_price && p.price < s.target_price) {
      const sv = s.target_price - p.price; if (sv > bestSaving) bestSaving = sv;
    }
    const hist = (pricesData.history||{})[s.id];
    if (hist && hist.length > 1) {
      const drop = Math.round((hist[0].price - hist[hist.length-1].price) / hist[0].price * 100);
      if (drop > bestDrop) { bestDrop = drop; bestDropRoute = (s.origin||'') + '→' + (s.destination||''); }
    }
  });
  const e1=document.getElementById('statTotal'), e2=document.getElementById('statTriggered');
  const e3=document.getElementById('statSaving'), e4=document.getElementById('statDrop'), e5=document.getElementById('statDropSub');
  if(e1) e1.textContent = subsData.length;
  if(e2) e2.textContent = triggered;
  if(e3) e3.textContent = bestSaving > 0 ? 'NT$' + bestSaving.toLocaleString() : '--';
  if(e4) e4.textContent = bestDrop > 0 ? '-' + bestDrop + '%' : '--';
  if(e5) e5.textContent = bestDropRoute || '最佳路線';
}

function updateSliderVal(val) {
  const el = document.getElementById('fcVal');
  if (el) el.textContent = 'NT$' + Number(val).toLocaleString();
}

function renderFeatured() {
  const el = document.getElementById('featuredCard'); if (!el) return;
  if (!subsData.length) { el.innerHTML = '<div class="loading-text">沒有追蹤路線</div>'; return; }
  const prices = pricesData.prices || {}, history = pricesData.history || {};
  let best = subsData[0];
  subsData.forEach(function(s) { if (prices[s.id] && !prices[best.id]) best = s; });
  const p = prices[best.id], hist = history[best.id] || [];
  const price = p ? p.price : null, target = best.target_price || 0;
  const priceStr = price ? 'NT$' + price.toLocaleString() : '--';
  const targetStr = target ? 'NT$' + target.toLocaleString() : '--';
  let svgPath = '';
  if (hist.length > 1) {
    const vals = hist.map(function(h) { return h.price; });
    const mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals), range = mx - mn || 1;
    svgPath = '<polyline points="' + vals.map(function(v, i) {
      return ((i/(vals.length-1))*280).toFixed(1) + ',' + (75 - ((v-mn)/range)*65).toFixed(1);
    }).join(' ') + '" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linejoin="round"/>';
  }
  let trend = '';
  if (hist.length >= 2) {
    const pct = Math.round((hist[hist.length-1].price - hist[0].price) / hist[0].price * 100);
    trend = '<span class="badge ' + (pct<0?'badge-green':'badge-red') + '">' + (pct<0?'▼':'▲') + ' ' + Math.abs(pct) + '%</span>';
  }
  const origin = best.origin || '', dest = best.destination || '';
  const initials = (origin.substring(0,2) + dest.substring(0,1)).toUpperCase();
  const smin = Math.round((price||5000)*0.7), smax = Math.round((price||5000)*1.3), sval = target||price||5000;
  el.innerHTML =
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">' +
    '<div class="route-avatar">' + initials + '</div>' +
    '<div><div style="font-weight:700;font-size:1.1rem">' + origin + ' → ' + dest + '</div>' +
    '<div style="color:var(--text-secondary);font-size:.85rem">' + (best.date||'') + '</div></div>' +
    (trend ? '<div style="margin-left:auto">' + trend + '</div>' : '') + '</div>' +
    '<div style="font-size:2rem;font-weight:800;color:var(--primary);margin-bottom:4px">' + priceStr + '</div>' +
    '<div style="color:var(--text-secondary);font-size:.85rem;margin-bottom:16px">目標價: ' + targetStr + '</div>' +
    '<div style="background:var(--bg-secondary);border-radius:8px;padding:12px;margin-bottom:16px">' +
    '<svg viewBox="0 0 280 80" style="width:100%;height:80px">' +
    (svgPath || '<text x="140" y="45" text-anchor="middle" fill="var(--text-secondary)" font-size="13">暫無歷史資料</text>') +
    '</svg></div>' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">' +
    '<label style="font-size:.85rem;color:var(--text-secondary)">目標價格:</label>' +
    '<input type="range" id="fcSlider" min="' + smin + '" max="' + smax + '" value="' + sval + '" style="flex:1" oninput="updateSliderVal(this.value)">' +
    '<span id="fcVal" style="font-weight:600">' + targetStr + '</span></div>' +
    '<button id="fcSim" class="btn-primary" style="width:100%">模擬到價提醒</button>';
  const sim = document.getElementById('fcSim');
  if (sim) sim.addEventListener('click', function() { showToast('✅ 模擬提醒: 已達標指定價格！'); });
}

function renderAlerts() {
  const el = document.getElementById('alertsList'); if (!el) return;
  const prices = pricesData.prices || {};
  const items = subsData.filter(function(s) {
    const p = prices[s.id]; return p && s.target_price && p.price <= s.target_price * 1.1;
  }).slice(0, 5);
  if (!items.length) { el.innerHTML = '<div class="loading-text">暫無價格警報</div>'; return; }
  el.innerHTML = items.map(function(s) {
    const p = prices[s.id], isHit = p.price <= s.target_price;
    return '<div class="alert-item"><div style="flex:1"><div style="font-weight:600">' + s.origin + ' → ' + s.destination + '</div>' +
      '<div style="font-size:.8rem;color:var(--text-secondary)">NT$' + p.price.toLocaleString() + '</div></div>' +
      '<span class="badge ' + (isHit?'badge-green':'badge-yellow') + '">' + (isHit?'已達標':'降價') + '</span></div>';
  }).join('');
}

function renderTable() {
  const tbody = document.getElementById('routeTableBody'); if (!tbody) return;
  if (!subsData.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-secondary)">暫無追蹤路線</td></tr>';
    return;
  }
  const prices = pricesData.prices || {}, history = pricesData.history || {};
  tbody.innerHTML = subsData.map(function(s) {
    const p = prices[s.id], hist = history[s.id] || [], price = p ? p.price : null;
    const priceStr = price ? 'NT$' + price.toLocaleString() : '--';
    const target = s.target_price || 0, targetStr = target ? 'NT$' + target.toLocaleString() : '--';
    let badge = '';
    if (hist.length >= 2) {
      const pct = Math.round((hist[hist.length-1].price - hist[0].price) / hist[0].price * 100);
      badge = '<span class="badge ' + (pct<0?'badge-green':'badge-red') + '">' + (pct<0?'▼':'▲') + ' ' + Math.abs(pct) + '%</span>';
    }
    let spark = '';
    if (hist.length > 1) {
      const vals = hist.map(function(h) { return h.price; });
      const mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals), range = mx - mn || 1;
      spark = '<svg viewBox="0 0 60 20" style="width:60px;height:20px"><polyline points="' + vals.map(function(v, i) {
        return ((i/(vals.length-1))*60).toFixed(1) + ',' + (18 - ((v-mn)/range)*14).toFixed(1);
      }).join(' ') + '" fill="none" stroke="var(--primary)" stroke-width="1.5"/></svg>';
    } else spark = '<span style="color:var(--text-secondary)">--</span>';
    const isHit = price && target && price <= target;
    const status = isHit ? '<span class="badge badge-green">已達標</span>' : '<span class="badge badge-gray">追蹤中</span>';
    const initials = ((s.origin||'').substring(0,2) + (s.destination||'').substring(0,1)).toUpperCase();
    const sid = (s.id||'').replace(/'/g, "\'");
    return '<tr><td><div style="display:flex;align-items:center;gap:8px">' +
      '<div class="route-avatar" style="width:32px;height:32px;font-size:.7rem">' + initials + '</div>' +
      '<div><div style="font-weight:600">' + (s.origin||'') + ' → ' + (s.destination||'') + '</div>' +
      '<div style="font-size:.75rem;color:var(--text-secondary)">' + (s.date||'') + '</div></div></div></td>' +
      '<td style="color:var(--text-secondary)">' + (s.airline||'--') + '</td>' +
      '<td style="font-weight:700;color:var(--primary)">' + priceStr + '</td>' +
      '<td>' + (badge||'<span style="color:var(--text-secondary)">--</span>') + '</td>' +
      '<td>' + spark + '</td><td>' + targetStr + '</td>' +
      '<td>' + status + ' <button class="btn-icon" onclick="deleteSub(\'' + sid + '\')" title="刪除">&#x1F5D1;</button></td></tr>';
  }).join('');
}

function setTheme(t, btn) {
  currentTheme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.querySelectorAll('.theme-btn').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
}

function openModal() { const m = document.getElementById('addModal'); if (m) m.style.display = 'flex'; }
function closeModal() { const m = document.getElementById('addModal'); if (m) m.style.display = 'none'; }

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div'); t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:8px;z-index:9999;font-size:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:opacity .5s';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(function() { t.style.opacity = '0'; }, 3000);
}

async function addSub() {
  const origin = (document.getElementById('inputOrigin')||{}).value||'';
  const destination = (document.getElementById('inputDest')||{}).value||'';
  const date = (document.getElementById('inputDate')||{}).value||'';
  const target = (document.getElementById('inputTarget')||{}).value||'';
  if (!origin || !destination || !date) { showToast('請填寫必要欄位'); return; }
  // Match existing ID format: lowercase "org-dst-yyyymmdd"
  const id = origin.toLowerCase() + '-' + destination.toLowerCase() + '-' + date.replace(/-/g,'');
  const newSub = { id: id, origin: origin.toUpperCase(), destination: destination.toUpperCase(), date: date, target_price: target ? parseInt(target) : null, active: true };
  if (subsData.some(function(s) { return s.id === newSub.id; })) { showToast('該路線已存在'); return; }
  subsData.push(newSub);
  await saveSubs(); closeModal();
  updateStats(); renderFeatured(); renderAlerts(); renderTable();
  showToast('✅ 已新增追蹤: ' + newSub.origin + ' → ' + newSub.destination);
}

async function deleteSub(id) {
  subsData = subsData.filter(function(s) { return s.id !== id; });
  await saveSubs(); updateStats(); renderFeatured(); renderAlerts(); renderTable();
  showToast('✅ 已刪除追蹤');
}

async function saveSubs() {
  try {
    const r = await fetch(WORKER_URL + '/subscriptions', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(subsData) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
  } catch(e) { showToast('儲存失敗: ' + e.message); }
}

window.addEventListener('click', function(e) { const m = document.getElementById('addModal'); if (m && e.target === m) closeModal(); });
loadSubs();
</script>
</body>
