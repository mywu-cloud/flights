name: Flight Price Tracker

on:
  schedule:
    - cron: '0 2 * * *'   # Taiwan time 10:00 (UTC+8)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run flight price scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. python scraper/main.py

      - name: Checkout gh-pages branch
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-data

      - name: Update price data on gh-pages
        if: always()
        run: |
          mkdir -p gh-pages-data/data
          cp data/prices.json gh-pages-data/data/prices.json 2>/dev/null || true
          cp data/history.json gh-pages-data/data/history.json 2>/dev/null || true

      - name: Commit and push price data
        if: always()
        working-directory: gh-pages-data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --staged --quiet || git commit -m "data: update flight prices $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload scraper logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
