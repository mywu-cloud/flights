name: Initialize gh-pages branch

on:
  workflow_dispatch:

  jobs:
    init:
        runs-on: ubuntu-latest
            permissions:
                  contents: write
                      steps:
                            - name: Setup gh-pages branch and initial data
                                    uses: actions/github-script@v7
                                            with:
                                                      script: |
                                                                  const owner = context.repo.owner;
                                                                              const repo = context.repo.repo;

                                                                                          let branchExists = false;
                                                                                                      try {
                                                                                                                    await github.rest.repos.getBranch({ owner, repo, branch: 'gh-pages' });
                                                                                                                                  branchExists = true;
                                                                                                                                                console.log('gh-pages branch already exists');
                                                                                                                                                            } catch (e) {
                                                                                                                                                                          console.log('gh-pages branch not found, creating...');
                                                                                                                                                                                      }
                                                                                                                                                                                      
                                                                                                                                                                                                  if (!branchExists) {
                                                                                                                                                                                                                const mainRef = await github.rest.git.getRef({ owner, repo, ref: 'heads/main' });
                                                                                                                                                                                                                              await github.rest.git.createRef({
                                                                                                                                                                                                                                              owner, repo,
                                                                                                                                                                                                                                                              ref: 'refs/heads/gh-pages',
                                                                                                                                                                                                                                                                              sha: mainRef.data.object.sha
                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                          console.log('Created gh-pages branch');
                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                  const files = {
                                                                                                                                                                                                                                                                                                                                                'data/prices.json': JSON.stringify({ updated_at: new Date().toISOString(), prices: {} }, null, 2),
                                                                                                                                                                                                                                                                                                                                                              'data/history.json': JSON.stringify({ updated_at: new Date().toISOString(), history: {} }, null, 2),
                                                                                                                                                                                                                                                                                                                                                                          };
                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                      for (const [path, content] of Object.entries(files)) {
                                                                                                                                                                                                                                                                                                                                                                                                    let sha = undefined;
                                                                                                                                                                                                                                                                                                                                                                                                                  try {
                                                                                                                                                                                                                                                                                                                                                                                                                                  const existing = await github.rest.repos.getContent({ owner, repo, path, ref: 'gh-pages' });
                                                                                                                                                                                                                                                                                                                                                                                                                                                  sha = existing.data.sha;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                } catch {}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              await github.rest.repos.createOrUpdateFileContents({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              owner, repo, path,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              message: 'data: initialize ' + path,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              content: Buffer.from(content).toString('base64'),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              branch: 'gh-pages',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              ...(sha ? { sha } : {})
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          console.log('Created ' + path);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }
