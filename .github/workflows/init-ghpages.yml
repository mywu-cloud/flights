name: Initialize gh-pages branch

on:
  workflow_dispatch:  # 手動執行一次即可

  jobs:
    init:
        runs-on: ubuntu-latest
            steps:
                  - name: Create gh-pages branch with initial data structure
                          uses: actions/github-script@v7
                                  with:
                                            script: |
                                                        const owner = context.repo.owner;
                                                                    const repo = context.repo.repo;

                                                                                // Check if gh-pages branch exists
                                                                                            let branchExists = false;
                                                                                                        try {
                                                                                                                      await github.rest.repos.getBranch({ owner, repo, branch: 'gh-pages' });
                                                                                                                                    branchExists = true;
                                                                                                                                                  console.log('gh-pages branch already exists');
                                                                                                                                                              } catch (e) {
                                                                                                                                                                            console.log('gh-pages branch does not exist, creating...');
                                                                                                                                                                                        }
                                                                                                                                                                                        
                                                                                                                                                                                                    if (!branchExists) {
                                                                                                                                                                                                                  // Get main branch SHA
                                                                                                                                                                                                                                const mainRef = await github.rest.git.getRef({
                                                                                                                                                                                                                                                owner, repo, ref: 'heads/main'
                                                                                                                                                                                                                                                              });
                                                                                                                                                                                                                                                                            const sha = mainRef.data.object.sha;
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                          // Create gh-pages branch
                                                                                                                                                                                                                                                                                                        await github.rest.git.createRef({
                                                                                                                                                                                                                                                                                                                        owner, repo,
                                                                                                                                                                                                                                                                                                                                        ref: 'refs/heads/gh-pages',
                                                                                                                                                                                                                                                                                                                                                        sha
                                                                                                                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                                                                                                                                    console.log('Created gh-pages branch');
                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                            // Initialize prices.json
                                                                                                                                                                                                                                                                                                                                                                                                                        const pricesContent = JSON.stringify({
                                                                                                                                                                                                                                                                                                                                                                                                                                      updated_at: new Date().toISOString(),
                                                                                                                                                                                                                                                                                                                                                                                                                                                    prices: {}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                }, null, 2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Initialize history.json
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const historyContent = JSON.stringify({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      updated_at: new Date().toISOString(),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    history: {}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }, null, 2);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            // Create or update data/prices.json on gh-pages
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        for (const [filename, content] of [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ['data/prices.json', pricesContent],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ['data/history.json', historyContent],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ]) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const existing = await github.rest.repos.getContent({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                owner, repo, path: filename, ref: 'gh-pages'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                await github.rest.repos.createOrUpdateFileContents({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  owner, repo, path: filename,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    message: `data: initialize ${filename}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      content: Buffer.from(content).toString('base64'),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        sha: existing.data.sha,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          branch: 'gh-pages'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        } catch {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        await github.rest.repos.createOrUpdateFileContents({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          owner, repo, path: filename,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            message: `data: initialize ${filename}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              content: Buffer.from(content).toString('base64'),
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                branch: 'gh-pages'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.log(`Created/updated ${filename}`);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
